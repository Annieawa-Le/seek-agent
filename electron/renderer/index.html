<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';">
  <title>Seek Agent</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- 顶部标题栏 -->
    <header id="header">
      <div class="header-left">
        <svg class="header-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        <span class="header-title">Seek Agent</span>
      </div>
      <div class="header-center">
        <span class="header-session-name">New Session · seek-agent</span>
      </div>
      <div class="header-right">
        <span id="ctx-display" class="header-ctx" title="上下文长度">ctx: --</span>
        <span id="status-dot" class="status-dot disconnected" title="未连接"></span>
      </div>
    </header>

    <!-- 主体区域（三栏 + 底部状态栏） -->
    <div id="body-content">
      <!-- 三栏行 -->
      <div id="body-row">
        <!-- 左侧导航栏 -->
        <aside id="left-sidebar">
          <div class="sidebar-section-header">
            <span class="section-title">Sessions</span>
            <div class="section-actions">
              <button class="section-action-btn" title="面板/分屏"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></button>
              <button class="section-action-btn" title="搜索"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
            </div>
          </div>
          <button id="new-session-btn" class="new-session-btn">
            <span class="ns-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></span>
            <span class="ns-text">New</span>
            <span class="ns-shortcut">Ctrl+N</span>
          </button>
          <div id="session-list" class="session-list">
            <!-- 由 renderer.js 加载 -->
          </div>
          <!-- 中间空白区域填充 -->
          <div id="sidebar-spacer"></div>
          <div id="customizations-section">
            <div class="sidebar-section-header collapsible" id="custom-header">
              <span class="section-title">Customizations</span>
              <span class="collapse-arrow" id="custom-arrow">▼</span>
            </div>
            <ul id="custom-list">
              <li class="custom-item" data-key="agents" data-expandable="true">
                <svg class="custom-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>
                <span class="custom-label">Agents</span>
                <span class="custom-expand">▶</span>
              </li>
              <li class="custom-item" data-key="skills" data-expandable="true">
                <svg class="custom-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a4 4 0 0 1 4 4v2a4 4 0 0 1-8 0V6a4 4 0 0 1 4-4z"/><path d="M2 22v-2a6 6 0 0 1 6-6h8a6 6 0 0 1 6 6v2"/></svg>
                <span class="custom-label">Skills</span>
                <span class="custom-badge">10</span>
                <span class="custom-expand">▶</span>
              </li>
              <li class="custom-item" data-key="instructions" data-expandable="true">
                <svg class="custom-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/></svg>
                <span class="custom-label">Instructions</span>
                <span class="custom-expand">▶</span>
              </li>
              <li class="custom-item" data-key="hooks" data-expandable="true">
                <svg class="custom-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                <span class="custom-label">Hooks</span>
                <span class="custom-expand">▶</span>
              </li>
              <li class="custom-item" data-key="mcp" data-expandable="true">
                <svg class="custom-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                <span class="custom-label">MCP Servers</span>
                <span class="custom-badge">2</span>
                <span class="custom-expand">▶</span>
              </li>
              <li class="custom-item" data-key="plugins" data-expandable="true">
                <svg class="custom-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12H4"/><path d="M12 4v16"/></svg>
                <span class="custom-label">Plugins</span>
                <span class="custom-expand">▶</span>
              </li>
            </ul>
          </div>
        </aside>

        <!-- 中栏：主工作区 -->
        <div id="main-content">
          <!-- 顶部工具栏 -->
          <div id="main-toolbar">
            <span class="toolbar-icon">◇</span>
            <span class="toolbar-context">
              New session in <span class="ctx-folder">📁 seek-agent ▼</span>
              with <span class="ctx-tool">🔒 Copilot CLI ▼</span>
            </span>
          </div>

          <!-- 消息区域 -->
          <div id="message-area">
            <div id="message-list"></div>
          </div>

          <!-- 输入栏（嵌入中栏底部） -->
          <div id="input-bar" class="input-bar">
            <div id="thinking-spinner" class="thinking-spinner" style="display:none" title="AI 思考中…">⠋</div>
            <div id="input-wrapper" class="input-wrapper">
              <textarea id="message-input" rows="1" placeholder="输入消息…（Enter 发送，Shift+Enter 换行）"></textarea>
            </div>
            <button id="send-btn" class="send-btn" title="发送">
              <svg id="send-icon" class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              <svg id="stop-icon" class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
            </button>
          </div>
        </div>

        <!-- 右栏：文件树 -->
        <aside id="info-panel">
          <div class="panel-tabs">
            <span class="panel-tab inactive" data-tab="changes">Changes</span>
            <span class="panel-tab active" data-tab="files">Files</span>
            <div class="panel-tab-actions">
              <button class="panel-tab-btn" title="搜索"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
              <button class="panel-tab-btn" title="面板布局"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></button>
            </div>
          </div>
          <div id="panel-content">
            <!-- 由 renderer.js 动态渲染 -->
          </div>
        </aside>
      </div>

      <!-- 底部状态栏（横跨三栏） -->
      <div id="main-status">
        <span class="ms-left">
          <span id="status-text" class="status-text"></span>
          <span id="tools-badge" class="tools-badge" style="display:none"></span>
        </span>
        <span class="ms-right">📁 Folder &nbsp;│&nbsp; Git Branch</span>
      </div>
    </div>

  </div>

  <script src="renderer.js"></script>
</body>
</html>
