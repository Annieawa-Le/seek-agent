<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';">
  <title>Seek Agent</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- 顶部标题栏 -->
    <header id="header">
      <div class="header-left">
        <span class="header-icon">✨</span>
        <span class="header-title">Seek Agent</span>
      </div>
      <div class="header-center">
        <span class="header-session-name">New Session · seek-agent</span>
      </div>
      <div class="header-right">
        <span id="ctx-display" class="header-ctx" title="上下文长度">ctx: --</span>
        <span id="status-dot" class="status-dot disconnected" title="未连接"></span>
      </div>
    </header>

    <!-- 主体区域（三栏 + 底部状态栏） -->
    <div id="body-content">
      <!-- 三栏行 -->
      <div id="body-row">
        <!-- 左侧导航栏 -->
        <aside id="left-sidebar">
          <div class="sidebar-section-header">
            <span class="section-title">Sessions</span>
            <div class="section-actions">
              <button class="section-action-btn" title="面板/分屏">⊞</button>
              <button class="section-action-btn" title="搜索">🔍</button>
            </div>
          </div>
          <button id="new-session-btn" class="new-session-btn">
            <span class="ns-icon">+</span>
            <span class="ns-text">New</span>
            <span class="ns-shortcut">Ctrl+N</span>
          </button>
          <div id="session-list" class="session-list">
            <!-- 由 renderer.js 加载 -->
          </div>
          <!-- 中间空白区域填充 -->
          <div id="sidebar-spacer"></div>
          <div id="customizations-section">
            <div class="sidebar-section-header collapsible" id="custom-header">
              <span class="section-title">Customizations</span>
              <span class="collapse-arrow" id="custom-arrow">▼</span>
            </div>
            <ul id="custom-list">
              <li class="custom-item" data-key="agents" data-expandable="true">
                <span class="custom-icon">💬</span>
                <span class="custom-label">Agents</span>
                <span class="custom-expand">▶</span>
              </li>
              <li class="custom-item" data-key="skills" data-expandable="true">
                <span class="custom-icon">💡</span>
                <span class="custom-label">Skills</span>
                <span class="custom-badge">10</span>
                <span class="custom-expand">▶</span>
              </li>
              <li class="custom-item" data-key="instructions" data-expandable="true">
                <span class="custom-icon">📄</span>
                <span class="custom-label">Instructions</span>
                <span class="custom-expand">▶</span>
              </li>
              <li class="custom-item" data-key="hooks" data-expandable="true">
                <span class="custom-icon">⚡</span>
                <span class="custom-label">Hooks</span>
                <span class="custom-expand">▶</span>
              </li>
              <li class="custom-item" data-key="mcp" data-expandable="true">
                <span class="custom-icon">📋</span>
                <span class="custom-label">MCP Servers</span>
                <span class="custom-badge">2</span>
                <span class="custom-expand">▶</span>
              </li>
              <li class="custom-item" data-key="plugins" data-expandable="true">
                <span class="custom-icon">🔌</span>
                <span class="custom-label">Plugins</span>
                <span class="custom-expand">▶</span>
              </li>
            </ul>
          </div>
        </aside>

        <!-- 中栏：主工作区 -->
        <div id="main-content">
          <!-- 顶部工具栏 -->
          <div id="main-toolbar">
            <span class="toolbar-icon">◇</span>
            <span class="toolbar-context">
              New session in <span class="ctx-folder">📁 seek-agent ▼</span>
              with <span class="ctx-tool">🔒 Copilot CLI ▼</span>
            </span>
          </div>

          <!-- 消息区域 -->
          <div id="message-area">
            <div id="message-list"></div>
          </div>

          <!-- 输入栏（嵌入中栏底部） -->
          <div id="input-bar" class="input-bar">
            <div id="thinking-spinner" class="thinking-spinner" style="display:none" title="AI 思考中…">⠋</div>
            <div id="input-wrapper" class="input-wrapper">
              <textarea id="message-input" rows="1" placeholder="输入消息…（Enter 发送，Shift+Enter 换行）"></textarea>
            </div>
            <button id="send-btn" class="send-btn" title="发送">
              <svg id="send-icon" class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              <svg id="stop-icon" class="btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
            </button>
          </div>
        </div>

        <!-- 右栏：文件树 -->
        <aside id="info-panel">
          <div class="panel-tabs">
            <span class="panel-tab inactive" data-tab="changes">Changes</span>
            <span class="panel-tab active" data-tab="files">Files</span>
            <div class="panel-tab-actions">
              <button class="panel-tab-btn" title="搜索">🔍</button>
              <button class="panel-tab-btn" title="面板布局">⊞</button>
            </div>
          </div>
          <div id="panel-content">
            <!-- 由 renderer.js 动态渲染 -->
          </div>
        </aside>
      </div>

      <!-- 底部状态栏（横跨三栏） -->
      <div id="main-status">
        <span class="ms-left">
          <span id="status-text" class="status-text"></span>
          <span id="tools-badge" class="tools-badge" style="display:none"></span>
        </span>
        <span class="ms-right">📁 Folder &nbsp;│&nbsp; Git Branch</span>
      </div>
    </div>

  </div>

  <script src="renderer.js"></script>
</body>
</html>
